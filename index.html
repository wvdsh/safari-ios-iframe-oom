<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>multithread crash test</title>
		<style>
			html, body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #0b0b12;
				color: #f1f5f9;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			}
			#root {
				position: absolute;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				padding: 24px;
				box-sizing: border-box;
				text-align: center;
			}
			h1 {
				margin: 0;
				font-size: clamp(20px, 4vw, 32px);
				font-weight: 700;
			}
			button {
				font: inherit;
				font-size: clamp(16px, 3vw, 22px);
				padding: 16px 28px;
				border-radius: 12px;
				border: 1px solid #ef4444;
				background: #b91c1c;
				color: white;
				cursor: pointer;
				touch-action: manipulation;
			}
			button:disabled {
				background: #4b5563;
				border-color: #6b7280;
				cursor: not-allowed;
			}
			#stats {
				font-size: clamp(13px, 2.5vw, 16px);
				line-height: 1.6;
				min-height: 8em;
				white-space: pre-wrap;
				opacity: 0.85;
			}
			.bar {
				width: min(80vw, 480px);
				height: 14px;
				border: 1px solid #374151;
				border-radius: 6px;
				overflow: hidden;
				background: #111827;
			}
			.bar > .fill {
				height: 100%;
				width: 0%;
				background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
				transition: width 0.2s linear;
			}
			.subtle { opacity: 0.6; font-size: 12px; }
		</style>
	</head>
	<body>
		<div id="root">
			<h1>Multithread crash test</h1>
			<div id="stats">Idle. Tap below to begin allocating memory across Web Workers.</div>
			<div class="bar"><div id="fill" class="fill"></div></div>
			<button id="start">Crash my browser</button>
			<div class="subtle">URL params: ?workers=N &amp; ?mb=N &amp; ?delay=N &amp; ?auto=1</div>
		</div>
		<script type="module" src="./main.js"></script>
	</body>
</html>
