<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>parent page — iframe OOM test</title>
		<style>
			html, body { margin: 0; padding: 0; height: 100%; font-family: ui-monospace, monospace; background: #0b0b12; color: #f1f5f9; }
			header { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; }
			h1 { margin: 0 0 4px; font-size: 16px; }
			#status { font-size: 13px; opacity: 0.85; }
			iframe { width: 100%; height: calc(100% - 64px); border: 0; display: block; }
			.alive { color: #22c55e; }
			.stale { color: #eab308; }
			.dead { color: #ef4444; }
		</style>
	</head>
	<body>
		<header>
			<h1>parent page hosts the crash iframe</h1>
			<div id="status">iframe heartbeat: waiting…</div>
		</header>
		<iframe id="frame" src="./index.html"></iframe>
		<script>
			// Set ?src= to load the iframe from a different origin (the actual repro).
			// Example: parent.html?src=https://wvdsh.github.io/safari-ios-iframe-oom/
			const params = new URLSearchParams(location.search);
			const customSrc = params.get('src');
			if (customSrc) document.getElementById('frame').src = customSrc;

			const statusEl = document.getElementById('status');
			let lastBeat = 0;
			window.addEventListener('message', (e) => {
				if (e.data && e.data.type === 'wavedash.heartbeat') {
					lastBeat = performance.now();
				}
			});
			setInterval(() => {
				if (lastBeat === 0) {
					statusEl.textContent = 'iframe heartbeat: waiting…';
					statusEl.className = '';
					return;
				}
				const age = performance.now() - lastBeat;
				if (age < 500) {
					statusEl.textContent = `iframe heartbeat: alive (${age.toFixed(0)} ms)`;
					statusEl.className = 'alive';
				} else if (age < 3000) {
					statusEl.textContent = `iframe heartbeat: stale (${age.toFixed(0)} ms)`;
					statusEl.className = 'stale';
				} else {
					statusEl.textContent = `iframe heartbeat: dead (${age.toFixed(0)} ms since last beat)`;
					statusEl.className = 'dead';
				}
			}, 250);
		</script>
	</body>
</html>
